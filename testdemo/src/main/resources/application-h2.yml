spring:
  datasource:
    url: jdbc:h2:mem:testdemo;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/schema-h2.sql
  h2:
    console:
      enabled: true
      path: /h2-console

